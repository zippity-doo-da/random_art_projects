<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asteroids</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center;
         min-height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }
  canvas { display: block; }
  #ui { position: absolute; top: 12px; left: 0; right: 0;
        display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; }
  .ui-left, .ui-right { pointer-events: all; }
  .stat { color: #0ff; font-size: 13px; letter-spacing: 2px;
          text-shadow: 0 0 8px #0ff; line-height: 1.9; }
  .stat span { color: #fff; }
  #autoBtn {
    background: transparent; border: 1px solid #0f0; color: #0f0;
    font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 2px;
    padding: 6px 14px; cursor: pointer; text-shadow: 0 0 6px #0f0;
    box-shadow: 0 0 8px #0f04; transition: all 0.2s; display: block; margin-bottom: 8px;
  }
  #autoBtn.on { background: #0f02; box-shadow: 0 0 16px #0f08; }
  #autoBtn:hover { box-shadow: 0 0 20px #0f0a; }
  #stopBtn {
    background: transparent; border: 1px solid #f40; color: #f40;
    font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 2px;
    padding: 6px 14px; cursor: pointer; text-shadow: 0 0 6px #f40;
    box-shadow: 0 0 8px #f404; transition: all 0.2s; display: none; margin-bottom: 8px;
  }
  #stopBtn:hover { box-shadow: 0 0 20px #f40a; }
  #speedRow { display: flex; align-items: center; gap: 8px; }
  #speedRow label { color: #0ff; font-size: 12px; letter-spacing: 1px; text-shadow: 0 0 6px #0ff; }
  #speedSlider { width: 80px; accent-color: #0ff; }
  #speedVal { color: #fff; font-size: 12px; min-width: 30px; }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: #0008;
    pointer-events: none; opacity: 0; transition: opacity 0.5s;
  }
  #overlay.show { opacity: 1; pointer-events: all; }
  #overlay h1 { font-size: 52px; letter-spacing: 10px; color: #fff;
                text-shadow: 0 0 30px #fff, 0 0 60px #0ff4; margin-bottom: 14px; }
  #overlay .sub { font-size: 15px; letter-spacing: 3px; color: #0ff;
                  text-shadow: 0 0 10px #0ff; margin: 8px 0; }
  #overlay .final { font-size: 22px; color: #fff; letter-spacing: 3px; margin: 12px 0;
                    text-shadow: 0 0 10px #fff; }
  #overlay p { font-size: 13px; letter-spacing: 2px; color: #666; margin: 4px 0; }
  #restartBtn {
    margin-top: 20px; background: transparent; border: 1px solid #0ff; color: #0ff;
    font-family: 'Courier New', monospace; font-size: 14px; letter-spacing: 3px;
    padding: 10px 28px; cursor: pointer; text-shadow: 0 0 8px #0ff;
    box-shadow: 0 0 12px #0ff4; transition: all 0.2s; display: none;
  }
  #restartBtn:hover { background: #0ff2; box-shadow: 0 0 24px #0ff8; }
  #controls { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); }
  #controls p { color: #333; font-size: 11px; letter-spacing: 2px; text-align: center; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div class="ui-left">
    <div class="stat">SCORE  <span id="scoreEl">0</span></div>
    <div class="stat">HI     <span id="hiEl">0</span></div>
    <div class="stat">LIVES  <span id="livesEl">3</span></div>
    <div class="stat">WAVE   <span id="waveEl">1</span></div>
  </div>
  <div class="ui-right">
    <button id="autoBtn">AUTO OFF</button>
    <button id="stopBtn">■ STOP</button>
    <div id="speedRow">
      <label>SPEED</label>
      <input type="range" id="speedSlider" min="0.5" max="6" step="0.1" value="1">
      <span id="speedVal">1.0×</span>
    </div>
  </div>
</div>

<div id="overlay" class="show">
  <h1>ASTEROIDS</h1>
  <div class="sub" id="overlayTitle">PRESS SPACE TO START</div>
  <div class="final" id="overlayScore"></div>
  <p id="overlayMsg"></p>
  <button id="restartBtn">PLAY AGAIN</button>
</div>

<div id="controls">
  <p>← → ROTATE &nbsp;·&nbsp; ↑ THRUST &nbsp;·&nbsp; SPACE FIRE &nbsp;·&nbsp; H HYPERSPACE</p>
</div>

<script>
// ── DOM refs ──────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const ctx      = canvas.getContext('2d');
const scoreEl  = document.getElementById('scoreEl');
const hiEl     = document.getElementById('hiEl');
const livesEl  = document.getElementById('livesEl');
const waveEl   = document.getElementById('waveEl');
const autoBtn  = document.getElementById('autoBtn');
const stopBtn  = document.getElementById('stopBtn');
const overlay  = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayScore = document.getElementById('overlayScore');
const overlayMsg   = document.getElementById('overlayMsg');
const restartBtn   = document.getElementById('restartBtn');
const speedSlider  = document.getElementById('speedSlider');
const speedValEl   = document.getElementById('speedVal');

// ── Config ────────────────────────────────────────────────────────────────────
const CFG = {
  shipR:           12,
  rotSpeed:        Math.PI * 1.2,  // rad/s
  thrustAcc:       210,            // px/s²
  drag:            0.65,           // v *= exp(-drag * dt)
  bulletSpeed:     520,
  bulletLife:      0.82,
  maxBullets:      4,
  asteroidR:       [42, 24, 13],   // radii: 0=large 1=med 2=small
  asteroidPts:     [20, 50, 100],
  asteroidSpdBase: [55, 95, 150],
  asteroidSpdVar:  [30, 40, 60],
  saucerBigR:      22,
  saucerSmallR:    12,
  saucerBigPts:    200,
  saucerSmallPts:  1000,
  saucerBigSpd:    80,
  saucerSmallSpd:  130,
  saucerBigFireInt:   2.2,
  saucerSmallFireInt: 0.9,
  saucerBulletSpd:    220,
  saucerBulletLife:   1.5,
  saucerSpawnMin:  15,
  saucerSpawnMax:  28,
  invincTime:      3.0,
  respawnDelay:    1.8,
  extraLifeEvery:  10000,
  maxRocks:        26,
  startLives:      3,
  startWaveRocks:  4,
  maxWaveRocks:    11,
  autoFireInt:     0.22,
  hyperCooldown:   3.5,
};

// ── State ─────────────────────────────────────────────────────────────────────
let W, H;
let ship, asteroids, bullets, saucers, saucerBullets, particles, stars;
let score, hiScore = 0, lives, wave;
let gameOver, started, waveDelay;
let autoPlay = false, autoStopped = false;
let saucerSpawnTimer = 0;
let extraLifeAt;
let lastTs = 0;
let speedMult = 1.0;
let respawnTimer = 0;
let autoFireTimer = 0;
let fireCooldown = 0;
let hyperCooldown = 0;

// Manual keys
const keys = { left: false, right: false, up: false, fire: false, hyper: false };
// AI keys (separate so they don't conflict)
const aik  = { left: false, right: false, up: false, fire: false, hyper: false };

// ── Canvas resize ─────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  makeStars();
}
window.addEventListener('resize', resize);
resize();

// ── Helpers ───────────────────────────────────────────────────────────────────
function wrap(o) {
  if (o.x <  0) o.x += W;
  if (o.x >  W) o.x -= W;
  if (o.y <  0) o.y += H;
  if (o.y >  H) o.y -= H;
}
function dist2(ax, ay, bx, by) {
  const dx = ax - bx, dy = ay - by;
  return dx * dx + dy * dy;
}
function rand(a, b) { return a + Math.random() * (b - a); }
function angDiff(a, b) {
  let d = a - b;
  while (d >  Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}

// ── Stars ─────────────────────────────────────────────────────────────────────
function makeStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.2 + 0.2, a: Math.random() * 0.5 + 0.1 });
  }
}

// ── Particles ─────────────────────────────────────────────────────────────────
function explode(x, y, count, spd, col) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = spd * (0.3 + Math.random() * 0.9);
    const life = 0.5 + Math.random() * 0.7;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life, maxLife: life, col: col || '#fff' });
  }
}

// ── Asteroid factory ──────────────────────────────────────────────────────────
function makeAsteroid(x, y, size, avx, avy) {
  const base = CFG.asteroidSpdBase[size];
  const vary = CFG.asteroidSpdVar[size];
  const spd  = rand(base, base + vary);
  let angle, vx, vy;
  // Try to not head directly at ship center
  let tries = 0;
  do {
    angle = Math.random() * Math.PI * 2;
    vx = Math.cos(angle) * spd;
    vy = Math.sin(angle) * spd;
    tries++;
  } while (tries < 6 && avx !== undefined && dist2(x + vx, y + vy, avx, avy) < 160 * 160);

  const nv = 8 + Math.floor(Math.random() * 5);
  const shape = [];
  for (let i = 0; i < nv; i++) shape.push(0.65 + Math.random() * 0.7);

  return { x, y, vx, vy, size, shape, angle: Math.random() * Math.PI * 2, spin: rand(-1.3, 1.3) };
}

function spawnWaveRocks() {
  const count = Math.min(CFG.startWaveRocks + wave - 1, CFG.maxWaveRocks);
  for (let i = 0; i < count; i++) {
    let x, y;
    if (Math.random() < 0.5) {
      x = Math.random() < 0.5 ? rand(0, 60) : rand(W - 60, W);
      y = Math.random() * H;
    } else {
      x = Math.random() * W;
      y = Math.random() < 0.5 ? rand(0, 60) : rand(H - 60, H);
    }
    asteroids.push(makeAsteroid(x, y, 0, W / 2, H / 2));
  }
}

// ── Saucer factory ────────────────────────────────────────────────────────────
function spawnSaucer() {
  const big = score < 40000 ? (Math.random() < 0.55) : false;
  sndSaucerOn(big);
  const fromLeft = Math.random() < 0.5;
  const r   = big ? CFG.saucerBigR : CFG.saucerSmallR;
  const spd = big ? CFG.saucerBigSpd : CFG.saucerSmallSpd;
  saucers.push({
    x: fromLeft ? -r : W + r,
    y: rand(H * 0.1, H * 0.9),
    vx: (fromLeft ? 1 : -1) * spd,
    vy: 0,
    big, r,
    fireTimer: rand(0.8, big ? CFG.saucerBigFireInt : CFG.saucerSmallFireInt),
    dirTimer: rand(1.5, 4.0),
  });
  saucerSpawnTimer = rand(CFG.saucerSpawnMin, CFG.saucerSpawnMax);
}

// ── Hyperspace ────────────────────────────────────────────────────────────────
function doHyperspace() {
  if (hyperCooldown > 0 || !ship.alive) return;
  sndHyperspace();
  hyperCooldown = CFG.hyperCooldown;
  ship.x  = rand(W * 0.1, W * 0.9);
  ship.y  = rand(H * 0.1, H * 0.9);
  ship.vx = ship.vy = 0;
  if (Math.random() < 0.05) killShip();   // 5% self-destruct
}

// ── Ship death / respawn ──────────────────────────────────────────────────────
function killShip() {
  if (!ship.alive) return;
  ship.alive = false;
  sndThrustOff();
  sndShipDeath();
  explode(ship.x, ship.y, 22, 180, '#0ff');
  lives--;
  livesEl.textContent = lives;
  if (lives <= 0) {
    triggerGameOver();
  } else {
    respawnTimer = CFG.respawnDelay;
  }
}

function respawnShip() {
  ship.x = W / 2;
  ship.y = H / 2;
  ship.vx = ship.vy = 0;
  ship.angle = -Math.PI / 2;
  ship.alive = true;
  ship.invincTimer = CFG.invincTime;
}

// ── Score ─────────────────────────────────────────────────────────────────────
function addScore(pts) {
  score += pts;
  while (score >= extraLifeAt) {
    lives++;
    livesEl.textContent = lives;
    sndExtraLife();
    explode(W / 2, H * 0.08, 10, 90, '#ff0');
    extraLifeAt += CFG.extraLifeEvery;
  }
  if (score > hiScore) { hiScore = score; hiEl.textContent = hiScore; }
  scoreEl.textContent = score;
}

// ── Game init ─────────────────────────────────────────────────────────────────
function initGame() {
  ship = { x: W/2, y: H/2, vx: 0, vy: 0, angle: -Math.PI/2, alive: true, invincTimer: CFG.invincTime };
  asteroids     = [];
  bullets       = [];
  saucers       = [];
  saucerBullets = [];
  particles     = [];
  score         = 0;
  wave          = 1;
  lives         = CFG.startLives;
  gameOver      = false;
  waveDelay     = 0;
  respawnTimer  = 0;
  fireCooldown  = 0;
  hyperCooldown = 0;
  autoFireTimer = 0;
  extraLifeAt   = CFG.extraLifeEvery;
  saucerSpawnTimer = rand(CFG.saucerSpawnMin, CFG.saucerSpawnMax);

  Object.keys(aik).forEach(k => aik[k] = false);
  Object.keys(keys).forEach(k => keys[k] = false);

  scoreEl.textContent = '0';
  livesEl.textContent = lives;
  waveEl.textContent  = '1';

  spawnWaveRocks();
}

// ── Wave complete / next wave ─────────────────────────────────────────────────
function nextWave() {
  wave++;
  waveEl.textContent = wave;
  saucers       = [];
  saucerBullets = [];
  bullets       = [];
  saucerSpawnTimer = rand(CFG.saucerSpawnMin, CFG.saucerSpawnMax);
  spawnWaveRocks();
}

// ── Game over ─────────────────────────────────────────────────────────────────
function triggerGameOver() {
  gameOver = true;
  stopHeartbeat();
  sndThrustOff();
  sndSaucerOff();
  setTimeout(() => {
    if (autoPlay && !autoStopped) {
      // Auto mode: reset and keep going
      initGame();
      startHeartbeat();
    } else {
      overlayTitle.textContent  = 'GAME OVER';
      overlayScore.textContent  = 'SCORE: ' + score;
      overlayMsg.textContent    = 'WAVE ' + wave;
      restartBtn.style.display  = '';
      overlay.classList.add('show');
    }
  }, 2200);
}

// ── Input ─────────────────────────────────────────────────────────────────────
const KEY_MAP = {
  'ArrowLeft': 'left',  'KeyA': 'left',
  'ArrowRight':'right', 'KeyD': 'right',
  'ArrowUp':   'up',    'KeyW': 'up',
  'Space':     'fire',
  'KeyH':      'hyper', 'ShiftLeft': 'hyper', 'ShiftRight': 'hyper',
};

window.addEventListener('keydown', e => {
  const k = KEY_MAP[e.code] || KEY_MAP[e.key];
  if (k) { e.preventDefault(); if (!autoPlay) keys[k] = true; }
  if (!started && (e.code === 'Space' || e.key === ' ')) startGame();
});
window.addEventListener('keyup', e => {
  const k = KEY_MAP[e.code] || KEY_MAP[e.key];
  if (k) keys[k] = false;
});
overlay.addEventListener('click', () => { if (!started) startGame(); });

function startGame() {
  started = true;
  overlay.classList.remove('show');
  restartBtn.style.display = 'none';
  initGame();
  startHeartbeat();
}

restartBtn.addEventListener('click', () => {
  overlay.classList.remove('show');
  restartBtn.style.display = 'none';
  initGame();
  startHeartbeat();
});

// ── Speed slider ──────────────────────────────────────────────────────────────
speedSlider.addEventListener('input', () => {
  speedMult = parseFloat(speedSlider.value);
  speedValEl.textContent = speedMult.toFixed(1) + '×';
});

// ── Auto / Stop buttons ───────────────────────────────────────────────────────
autoBtn.addEventListener('click', () => {
  autoPlay = !autoPlay;
  autoStopped = false;
  Object.keys(aik).forEach(k => aik[k] = false);
  Object.keys(keys).forEach(k => keys[k] = false);
  autoBtn.textContent = autoPlay ? 'AUTO ON' : 'AUTO OFF';
  autoBtn.classList.toggle('on', autoPlay);
  stopBtn.style.display = autoPlay ? '' : 'none';
  if (!started) startGame();
  else if (gameOver && autoPlay) initGame();
});

stopBtn.addEventListener('click', () => {
  autoPlay    = false;
  autoStopped = true;
  Object.keys(aik).forEach(k => aik[k] = false);
  autoBtn.textContent = 'AUTO OFF';
  autoBtn.classList.remove('on');
  stopBtn.style.display = 'none';
  if (started && !gameOver) triggerGameOver();
});

// ── Auto AI ───────────────────────────────────────────────────────────────────
function autoThink(dt) {
  autoFireTimer = Math.max(0, autoFireTimer - dt);
  Object.keys(aik).forEach(k => aik[k] = false);

  if (!ship.alive) return;

  // ── Find nearest shootable target ──
  let target = null, targetDist = Infinity;
  for (const a of asteroids) {
    const d = Math.sqrt(dist2(ship.x, ship.y, a.x, a.y));
    if (d < targetDist) { targetDist = d; target = a; }
  }
  for (const s of saucers) {
    const d = Math.sqrt(dist2(ship.x, ship.y, s.x, s.y));
    if (d < targetDist) { targetDist = d; target = s; }
  }

  // ── Find nearest solid danger ──
  let dangerDist = Infinity, dangerX = 0, dangerY = 0, dangerR = 0;
  for (const a of asteroids) {
    const d = Math.sqrt(dist2(ship.x, ship.y, a.x, a.y));
    if (d < dangerDist) { dangerDist = d; dangerX = a.x; dangerY = a.y; dangerR = CFG.asteroidR[a.size]; }
  }
  for (const s of saucers) {
    const d = Math.sqrt(dist2(ship.x, ship.y, s.x, s.y));
    if (d < dangerDist) { dangerDist = d; dangerX = s.x; dangerY = s.y; dangerR = s.r; }
  }
  for (const b of saucerBullets) {
    const d = Math.sqrt(dist2(ship.x, ship.y, b.x, b.y));
    if (d < dangerDist * 0.6) { dangerDist = d * 0.6; dangerX = b.x; dangerY = b.y; dangerR = 3; }
  }

  // ── Emergency hyperspace ──
  if (dangerDist < 55 && dangerR >= CFG.asteroidR[1] && hyperCooldown <= 0) {
    aik.hyper = true;
    return;
  }

  // ── Aim and fire at target ──
  if (target) {
    const travelT   = targetDist / CFG.bulletSpeed;
    const leadX     = target.x + (target.vx || 0) * travelT;
    const leadY     = target.y + (target.vy || 0) * travelT;
    const aimAngle  = Math.atan2(leadY - ship.y, leadX - ship.x);
    const diff      = angDiff(aimAngle, ship.angle);

    aik.left  = diff < -0.06;
    aik.right = diff >  0.06;

    if (Math.abs(diff) < 0.20 && autoFireTimer <= 0) {
      aik.fire = true;
      autoFireTimer = CFG.autoFireInt;
    }
  }

  // ── Thrust logic ──
  const edgeM = 100;
  const nearEdge = ship.x < edgeM || ship.x > W - edgeM || ship.y < edgeM || ship.y > H - edgeM;
  const speed    = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);

  if (dangerDist < 110) {
    // Thrust away from nearest danger
    const awayA = Math.atan2(ship.y - dangerY, ship.x - dangerX);
    const td    = angDiff(awayA, ship.angle);
    // Rotate toward away-angle briefly (override aim rotation)
    if (Math.abs(td) > 0.4) {
      aik.left  = false;
      aik.right = false;
      if (td < 0) aik.left  = true;
      else        aik.right = true;
    }
    aik.up = Math.abs(td) < 1.1;
  } else if (nearEdge) {
    const cx    = W / 2 - ship.x, cy = H / 2 - ship.y;
    const ca    = Math.atan2(cy, cx);
    const cd    = angDiff(ca, ship.angle);
    aik.up      = Math.abs(cd) < 0.8;
  } else {
    // Stay somewhat mobile when speed is low
    aik.up = speed < 50;
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(dt) {
  if (gameOver) {
    // Still animate particles after death
    particles = particles.filter(p => {
      p.life -= dt; if (p.life <= 0) return false;
      p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.98; p.vy *= 0.98;
      return true;
    });
    return;
  }

  // Timers
  fireCooldown  = Math.max(0, fireCooldown  - dt);
  hyperCooldown = Math.max(0, hyperCooldown - dt);

  // Respawn
  if (!ship.alive) {
    respawnTimer -= dt;
    if (respawnTimer <= 0 && lives > 0) respawnShip();
  }

  // Wave delay (brief pause between waves)
  if (waveDelay > 0) {
    sndThrustOff();
    waveDelay -= dt;
    if (waveDelay <= 0) nextWave();
    particles = particles.filter(p => {
      p.life -= dt; if (p.life <= 0) return false;
      p.x += p.vx * dt; p.y += p.vy * dt; return true;
    });
    return;
  }

  const k = autoPlay ? aik : keys;

  // ── Ship ──
  if (ship.alive) {
    if (k.left)  ship.angle -= CFG.rotSpeed * dt;
    if (k.right) ship.angle += CFG.rotSpeed * dt;
    if (k.up) {
      ship.vx += Math.cos(ship.angle) * CFG.thrustAcc * dt;
      ship.vy += Math.sin(ship.angle) * CFG.thrustAcc * dt;
    }
    const drag = Math.exp(-CFG.drag * dt);
    ship.vx *= drag;
    ship.vy *= drag;
    ship.x  += ship.vx * dt;
    ship.y  += ship.vy * dt;
    wrap(ship);

    if (ship.invincTimer > 0) ship.invincTimer -= dt;

    // Fire
    if (k.fire && fireCooldown <= 0 && bullets.length < CFG.maxBullets) {
      bullets.push({
        x: ship.x + Math.cos(ship.angle) * CFG.shipR,
        y: ship.y + Math.sin(ship.angle) * CFG.shipR,
        vx: ship.vx + Math.cos(ship.angle) * CFG.bulletSpeed,
        vy: ship.vy + Math.sin(ship.angle) * CFG.bulletSpeed,
        life: CFG.bulletLife,
      });
      sndShoot();
      fireCooldown = 0.13;
      if (!autoPlay) keys.fire = false;  // single shot per keydown
      aik.fire = false;
    }

    // Thrust sound
    if (k.up) sndThrustOn(); else sndThrustOff();

    // Hyperspace
    if (k.hyper && hyperCooldown <= 0) {
      doHyperspace();
      if (!autoPlay) keys.hyper = false;
      aik.hyper = false;
    }
  }

  // ── Bullets ──
  bullets = bullets.filter(b => {
    b.life -= dt;
    if (b.life <= 0) return false;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    wrap(b);
    return true;
  });

  // ── Asteroids ──
  for (const a of asteroids) {
    a.x += a.vx * dt;
    a.y += a.vy * dt;
    a.angle += a.spin * dt;
    wrap(a);
  }

  // ── Saucers ──
  saucerSpawnTimer -= dt;
  if (saucerSpawnTimer <= 0 && saucers.length === 0 && asteroids.length > 0) spawnSaucer();

  for (const s of saucers) {
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.dirTimer -= dt;
    if (s.dirTimer <= 0) {
      s.vy = rand(-70, 70);
      s.dirTimer = rand(1.5, 4.0);
    }
    // Fire
    s.fireTimer -= dt;
    if (s.fireTimer <= 0) {
      s.fireTimer = s.big ? CFG.saucerBigFireInt : CFG.saucerSmallFireInt;
      let fa;
      if (s.big) {
        fa = Math.random() * Math.PI * 2;
      } else {
        if (ship.alive) {
          fa = Math.atan2(ship.y - s.y, ship.x - s.x);
          const inaccuracy = Math.max(0, 0.5 - score / 80000) * 0.5;
          fa += rand(-inaccuracy, inaccuracy);
        } else {
          fa = Math.random() * Math.PI * 2;
        }
      }
      saucerBullets.push({
        x: s.x, y: s.y,
        vx: Math.cos(fa) * CFG.saucerBulletSpd,
        vy: Math.sin(fa) * CFG.saucerBulletSpd,
        life: CFG.saucerBulletLife,
      });
    }
  }
  const _saucersBefore = saucers.length;
  saucers = saucers.filter(s => s.x > -s.r * 4 && s.x < W + s.r * 4);
  if (_saucersBefore > 0 && saucers.length === 0) sndSaucerOff();

  // ── Saucer bullets ──
  saucerBullets = saucerBullets.filter(b => {
    b.life -= dt;
    if (b.life <= 0) return false;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    wrap(b);
    return true;
  });

  // ── Particles ──
  particles = particles.filter(p => {
    p.life -= dt;
    if (p.life <= 0) return false;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.97;
    p.vy *= 0.97;
    return true;
  });

  // ── Collision: player bullets vs asteroids ──
  const deadBullets   = new Set();
  const deadAsteroids = new Set();
  const newRocks      = [];

  for (let bi = 0; bi < bullets.length; bi++) {
    if (deadBullets.has(bi)) continue;
    for (let ai = 0; ai < asteroids.length; ai++) {
      if (deadAsteroids.has(ai)) continue;
      const b = bullets[bi], a = asteroids[ai];
      const r = CFG.asteroidR[a.size];
      if (dist2(b.x, b.y, a.x, a.y) < r * r) {
        deadBullets.add(bi);
        deadAsteroids.add(ai);
        addScore(CFG.asteroidPts[a.size]);
        sndExplosion(a.size);
        explode(a.x, a.y, a.size === 0 ? 13 : a.size === 1 ? 9 : 5,
                130 - a.size * 25, `hsl(${40 + a.size * 20},60%,65%)`);
        if (a.size < 2) {
          const currentAlive = asteroids.length - deadAsteroids.size + newRocks.length;
          const childCount = currentAlive < CFG.maxRocks - 1 ? 2 : 1;
          for (let c = 0; c < childCount; c++) {
            const nr = makeAsteroid(a.x, a.y, a.size + 1);
            nr.vx += a.vx * 0.5;
            nr.vy += a.vy * 0.5;
            newRocks.push(nr);
          }
        }
        break;
      }
    }
  }
  bullets   = bullets.filter((_, i) => !deadBullets.has(i));
  asteroids = asteroids.filter((_, i) => !deadAsteroids.has(i)).concat(newRocks);

  // ── Collision: player bullets vs saucers ──
  const deadSBullets = new Set();
  const deadSaucers  = new Set();
  for (let bi = 0; bi < bullets.length; bi++) {
    for (let si = 0; si < saucers.length; si++) {
      if (deadSaucers.has(si) || deadSBullets.has(bi)) continue;
      const b = bullets[bi], s = saucers[si];
      if (dist2(b.x, b.y, s.x, s.y) < s.r * s.r) {
        deadSBullets.add(bi);
        deadSaucers.add(si);
        addScore(s.big ? CFG.saucerBigPts : CFG.saucerSmallPts);
        sndExplosion(-1);
        sndSaucerOff();
        explode(s.x, s.y, 16, 160, s.big ? '#ff0' : '#f80');
      }
    }
  }
  bullets  = bullets.filter((_, i) => !deadSBullets.has(i));
  saucers  = saucers.filter((_, i) => !deadSaucers.has(i));

  // ── Wave clear: check immediately after all collisions and saucer exits ──
  // If no alien was on screen when the last asteroid died, this fires this frame.
  // If an alien was transiting, this fires the frame it exits or is destroyed.
  if (asteroids.length === 0 && saucers.length === 0 && waveDelay === 0) {
    waveDelay = 2.5;
  }

  // ── Collision: ship vs everything ──
  if (ship.alive && ship.invincTimer <= 0) {
    const sr = CFG.shipR * 0.85;
    let hit = false;

    for (const a of asteroids) {
      if (dist2(ship.x, ship.y, a.x, a.y) < (CFG.asteroidR[a.size] + sr) ** 2) { hit = true; break; }
    }
    if (!hit) {
      for (const s of saucers) {
        if (dist2(ship.x, ship.y, s.x, s.y) < (s.r + sr) ** 2) { hit = true; break; }
      }
    }
    if (!hit) {
      for (const b of saucerBullets) {
        if (dist2(ship.x, ship.y, b.x, b.y) < (sr + 4) ** 2) { hit = true; break; }
      }
    }
    if (hit) killShip();
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.r, s.r);
  }
  ctx.globalAlpha = 1;

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
  }
  ctx.globalAlpha = 1;

  // Asteroids
  for (const a of asteroids) {
    const r  = CFG.asteroidR[a.size];
    const nv = a.shape.length;
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.angle);
    ctx.beginPath();
    for (let i = 0; i < nv; i++) {
      const ang = (i / nv) * Math.PI * 2;
      const rv  = r * a.shape[i];
      const px  = Math.cos(ang) * rv;
      const py  = Math.sin(ang) * rv;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth   = 1.5;
    ctx.shadowBlur  = 4;
    ctx.shadowColor = '#888';
    ctx.stroke();
    ctx.shadowBlur  = 0;
    ctx.restore();
  }

  // Player bullets
  ctx.fillStyle   = '#ff0';
  ctx.shadowBlur  = 7;
  ctx.shadowColor = '#ff0';
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Saucer bullets
  ctx.fillStyle   = '#f55';
  ctx.shadowBlur  = 6;
  ctx.shadowColor = '#f55';
  for (const b of saucerBullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Saucers
  for (const s of saucers) {
    const col = s.big ? '#ff0' : '#f80';
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.strokeStyle = col;
    ctx.lineWidth   = 1.8;
    ctx.shadowBlur  = 10;
    ctx.shadowColor = col;
    // Outer flat disk
    ctx.beginPath();
    ctx.ellipse(0, 0, s.r, s.r * 0.32, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Top dome
    ctx.beginPath();
    ctx.arc(0, 0, s.r * 0.52, 0, Math.PI, true);
    ctx.stroke();
    // Bottom arc (cabin)
    ctx.beginPath();
    ctx.arc(0, 0, s.r * 0.28, Math.PI, 0);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Ship
  if (ship.alive) {
    const blink = ship.invincTimer > 0 && Math.floor(ship.invincTimer * 9) % 2 === 0;
    if (!blink) {
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.angle);
      ctx.beginPath();
      ctx.moveTo(CFG.shipR,  0);
      ctx.lineTo(-CFG.shipR * 0.7,  CFG.shipR * 0.62);
      ctx.lineTo(-CFG.shipR * 0.38, 0);
      ctx.lineTo(-CFG.shipR * 0.7, -CFG.shipR * 0.62);
      ctx.closePath();
      ctx.strokeStyle = '#0ff';
      ctx.lineWidth   = 1.8;
      ctx.shadowBlur  = 10;
      ctx.shadowColor = '#0ff';
      ctx.stroke();

      // Thrust flame
      const ky = autoPlay ? aik : keys;
      if (ky.up) {
        ctx.beginPath();
        ctx.moveTo(-CFG.shipR * 0.38,  CFG.shipR * 0.28);
        ctx.lineTo(-CFG.shipR * (0.9 + Math.random() * 0.5), 0);
        ctx.lineTo(-CFG.shipR * 0.38, -CFG.shipR * 0.28);
        ctx.strokeStyle = `hsl(${25 + Math.random() * 25},100%,62%)`;
        ctx.lineWidth   = 1.5;
        ctx.shadowBlur  = 12;
        ctx.shadowColor = '#f80';
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  // Wave-clear text (drawn on canvas, not overlay)
  if (waveDelay > 0 && started && !gameOver) {
    const alpha = Math.min(1, waveDelay * 1.5) * Math.min(1, waveDelay);
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = '#fff';
    ctx.font        = 'bold 32px Courier New';
    ctx.textAlign   = 'center';
    ctx.shadowBlur  = 20;
    ctx.shadowColor = '#0ff';
    ctx.fillText('WAVE ' + (wave + 1), W / 2, H / 2);
    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
    ctx.textAlign   = 'left';
  }

  // Lives icons (mini ships in top-left area)
  const iconY = 110;
  for (let i = 0; i < lives; i++) {
    ctx.save();
    ctx.translate(22 + i * 22, iconY);
    ctx.rotate(-Math.PI / 2);
    ctx.beginPath();
    ctx.moveTo(8,  0);
    ctx.lineTo(-6,  5);
    ctx.lineTo(-3,  0);
    ctx.lineTo(-6, -5);
    ctx.closePath();
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth   = 1.2;
    ctx.shadowBlur  = 5;
    ctx.shadowColor = '#0ff';
    ctx.stroke();
    ctx.shadowBlur  = 0;
    ctx.restore();
  }
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  let dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  if (!started) { render(); return; }

  const effectiveDt = dt * speedMult;

  if (autoPlay && !gameOver) autoThink(effectiveDt);
  update(effectiveDt);
  render();
}

// ── Audio Engine ──────────────────────────────────────────────────────────────
let audioCtx = null;
let _thrustOsc = null, _thrustGain = null, _thrustFilter = null;
let _saucerOsc = null, _saucerLfo = null, _saucerGain = null;
let _beatTimeout = null, _beatPhase = 0;

function _ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function sndShoot() {
  const ac = _ac();
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(900, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(180, ac.currentTime + 0.08);
  g.gain.setValueAtTime(0.14, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + 0.09);
}

function sndExplosion(size) {         // size: 0 large, 1 med, 2 small (or -1 saucer)
  const ac = _ac();
  const dur   = size <= 0 ? 0.55 : size === 1 ? 0.32 : 0.18;
  const ffreq = size <= 0 ? 140  : size === 1 ? 280  : 480;
  const vol   = size <= 0 ? 0.40 : size === 1 ? 0.28 : 0.18;
  const len = Math.ceil(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource();
  src.buffer = buf;
  const bq = ac.createBiquadFilter(); bq.type = 'lowpass'; bq.frequency.value = ffreq;
  const g  = ac.createGain();
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(bq); bq.connect(g); g.connect(ac.destination);
  src.start(); src.stop(ac.currentTime + dur);
}

function sndShipDeath() {
  const ac = _ac();
  const dur = 1.4;
  const len = Math.ceil(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const bq = ac.createBiquadFilter(); bq.type = 'lowpass'; bq.frequency.value = 160;
  const g  = ac.createGain();
  g.gain.setValueAtTime(0.55, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(bq); bq.connect(g); g.connect(ac.destination);
  src.start(); src.stop(ac.currentTime + dur);
  // Extra descending whine
  const o = ac.createOscillator(), og = ac.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(600, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(40, ac.currentTime + 1.0);
  og.gain.setValueAtTime(0.18, ac.currentTime);
  og.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 1.0);
  o.connect(og); og.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + 1.0);
}

function sndThrustOn() {
  if (_thrustOsc) return;
  const ac = _ac();
  _thrustOsc    = ac.createOscillator();
  _thrustFilter = ac.createBiquadFilter();
  _thrustGain   = ac.createGain();
  _thrustOsc.type = 'sawtooth';
  _thrustOsc.frequency.value = 55;
  _thrustFilter.type = 'bandpass';
  _thrustFilter.frequency.value = 90;
  _thrustFilter.Q.value = 0.6;
  _thrustGain.gain.value = 0.055;
  _thrustOsc.connect(_thrustFilter);
  _thrustFilter.connect(_thrustGain);
  _thrustGain.connect(ac.destination);
  _thrustOsc.start();
}

function sndThrustOff() {
  if (!_thrustOsc) return;
  try { _thrustOsc.stop(); } catch(e){}
  _thrustOsc = null; _thrustFilter = null; _thrustGain = null;
}

function sndSaucerOn(big) {
  sndSaucerOff();
  const ac = _ac();
  _saucerOsc  = ac.createOscillator();
  _saucerLfo  = ac.createOscillator();
  _saucerGain = ac.createGain();
  const lfoGain = ac.createGain();
  _saucerOsc.type = 'square';
  _saucerOsc.frequency.value = big ? 460 : 880;
  _saucerLfo.type = 'sine';
  _saucerLfo.frequency.value = big ? 13 : 23;
  lfoGain.gain.value = big ? 170 : 310;
  _saucerGain.gain.value = 0.06;
  _saucerLfo.connect(lfoGain);
  lfoGain.connect(_saucerOsc.frequency);
  _saucerOsc.connect(_saucerGain);
  _saucerGain.connect(ac.destination);
  _saucerLfo.start(); _saucerOsc.start();
}

function sndSaucerOff() {
  if (!_saucerOsc) return;
  try { _saucerOsc.stop(); _saucerLfo.stop(); } catch(e){}
  _saucerOsc = null; _saucerLfo = null; _saucerGain = null;
}

function sndHyperspace() {
  const ac = _ac();
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(420, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(60, ac.currentTime + 0.22);
  g.gain.setValueAtTime(0.16, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.22);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + 0.23);
}

function sndExtraLife() {
  const ac = _ac();
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = ac.createOscillator(), g = ac.createGain();
    const t = ac.currentTime + i * 0.11;
    o.frequency.value = f; o.type = 'square';
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.10);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.11);
  });
}

function startHeartbeat() {
  stopHeartbeat();
  const tick = () => {
    if (gameOver || !started) return;
    const count   = asteroids.length + saucers.length;
    const interval = Math.max(230, Math.min(1400, 230 + count * 90));
    const ac = _ac();
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine';
    o.frequency.value = _beatPhase === 0 ? 82 : 62;
    _beatPhase = 1 - _beatPhase;
    g.gain.setValueAtTime(0.20, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.10);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + 0.11);
    _beatTimeout = setTimeout(tick, interval);
  };
  _beatTimeout = setTimeout(tick, 900);
}

function stopHeartbeat() {
  if (_beatTimeout) { clearTimeout(_beatTimeout); _beatTimeout = null; }
}

// ── Kick off ──────────────────────────────────────────────────────────────────
requestAnimationFrame(loop);
</script>
